hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

async_training:

  # Maximum samples staleness threshold
  staleness_threshold: 0.1

  # Frequency of parameter synchronization between rollouter and trainer, 
  # One step means trainer obtains a batch of required samples
  trigger_parameter_sync_step: 4
  
  # The number of ppo_mini_batches that the FullyAsyncTrainer obtains once
  require_batches: 1

  # When synchronizing parameters, Whether to resume generation when rollout is interrupted.
  # If True, LLMServerClient auto resume generation, making rollout interruption invisible to the AgentLoop.
  partial_rollout: True

  # whether to use trainer do_validate
  use_trainer_do_validate: False

  # Stage-1 Xiaoshuai real chunk data path. 0 keeps the upstream full-sample
  # queue behavior. Set to e.g. 256 to publish ChunkSample payloads.
  chunk_tokens: 0

  # Optional trainer-side chunk token budget. Null means
  # ppo_mini_batch_size * require_batches * chunk_tokens.
  chunk_token_budget: null

  # Optional per-optimizer-step token budget (control-plane decoupling). Null/0 keeps the
  # current behavior: one optimizer step + version bump + weight sync per fit_step. When
  # > 0, streamed-chunk supervision is accumulated across fit_steps until this many
  # trainable tokens are reached, then ONE optimizer step + version bump + sync fires
  # (data plane / chunk streaming unchanged). Env override OPD_OPTIMIZER_STEP_TOKEN_BUDGET
  # (absolute) or OPD_OPTIMIZER_STEP_BUDGET_MULT (multiplier of chunk_token_budget; the
  # "moderate" setting is mult == trigger_parameter_sync_step). Requires ppo_epochs=1.
  optimizer_step_token_budget: null

  # Starvation escape for the budget mode above (default ON; fixes the m12 budget-flush
  # <-> staleness-pause deadlock). When the rollouter is fully stalled (paused, nothing in
  # flight, queue drained) while accumulated supervision is pending, the trainer flushes it
  # early to bump the version + reset staleness and resume the rollouter. Inert when
  # optimizer_step_token_budget<=0 and outside the stall fingerprint. Env override
  # OPD_STARVATION_ESCAPE. Set false to reproduce the old (deadlocking) behavior.
  starvation_escape: true

  # Optional safety cap (0 = OFF): force a budget-mode optimizer-step flush after at most
  # this many accumulated chunk-batch fit_steps even if optimizer_step_token_budget is not
  # met, bounding version lag. 0 keeps the pure-token-budget cadence. Env override
  # OPD_OPTIMIZER_STEP_MAX_FIT_STEPS.
  optimizer_step_max_fit_steps: 0

  # When true (budget mode only), validate on every version-bumping flush regardless of
  # trainer.test_freq -> dense val curves for budget arms. Default false. Env override
  # OPD_VALIDATE_EVERY_FLUSH.
  validate_every_flush: false

  # Optional chunk staleness threshold. Null/fallback is staleness_threshold.
  chunk_staleness_threshold: null

  # Optional Xiaoshuai FIFO coalescing. Disabled by default to preserve the
  # existing one-chunk-per-row behavior unless explicitly enabled.
  coalesce_contiguous_chunks: false
  max_coalesced_chunks: null
  max_coalesced_effective_seq_len: null
  # Bounded FIFO lookahead window (in pending chunks) for merging same-parent
  # contiguous successors that are interleaved with other rollouts. 0 keeps the
  # original adjacent-only behavior (immediate next pending chunk only).
  coalesce_lookahead: 0
  # Pool-level drain multiplier. When coalescing is enabled and this is > 1.0,
  # the trainer keeps draining already-queued chunks past the train-token budget
  # (up to budget * multiplier) so the same-parent coalescer sees a larger pool
  # of sibling chunks before the cut. 1.0 disables draining (cut at budget).
  # Never blocks on new arrivals. Env override: OPD_STAGE1_COALESCE_DRAIN_MULTIPLIER.
  coalesce_drain_multiplier: 1.0

# Rollout config
rollout:

  # Number of nodes used in the rollout
  nnodes: 1

  # Number of GPUs per node                     
  n_gpus_per_node: 8

  # number of responses (i.e. num sample times). > 1 for grpo
  n: 4

  # total rollout samples # TODO rename to total_rollout_samples
  total_rollout_steps: 100

data:
  # Number of samples generated, currently only support 1
  gen_batch_size: 1

actor_rollout_ref:

  rollout:
    # Must be enabled! Otherwise, log_probs cannot be calculated.
    calculate_log_probs: True

    checkpoint_engine:
      backend: "nccl"

  actor:
    # Must use rollout log probs for training
    use_rollout_log_probs: True

  model:
    # To use remove padding (thd)
    use_remove_padding: True


# Only then will the use of log probs be correct.
# And it can be used in conjunction with other rollout_correction algorithms.
algorithm:
  rollout_correction:
    bypass_mode: True
